# Render.com deployment config for AIO Toolkit backend
services:
  - type: web
    name: aio-toolkit-api
    runtime: python
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://aio-toolkit.vercel.app
      - key: YTDLP_COOKIES_FILE
        value: ""
      - key: YTDLP_COOKIES_B64
        value: ""
    plan: free
